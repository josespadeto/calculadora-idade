<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioCronos - Health Suite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="main-nav">
        <div class="nav-links">
            <button onclick="showTool('age')" id="nav-age">Idade</button>
            <button onclick="showTool('imc')" id="nav-imc">IMC</button>
            <button onclick="showTool('bio')" id="nav-bio">Bio</button>
        </div>
        <div class="lang-buttons">
            <button onclick="setLanguage('pt')">PT</button>
            <button onclick="setLanguage('en')">EN</button>
            <button onclick="setLanguage('es')">ES</button>
        </div>
    </nav>

    <div class="container">
        <section id="tool-age" class="tool-section">
            <h1 id="txt-title">Calculadora de Idade</h1>
            <div class="input-group">
                <label for="birthdate" id="txt-label">Data de Nascimento:</label>
                <input type="date" id="birthdate">
            </div>
            <button onclick="calculateAge()" class="btn-main" id="txt-btn">Calcular Idade</button>
        </section>

        <section id="tool-imc" class="tool-section" style="display:none;">
            <h1 id="txt-title-imc">Calculadora de IMC</h1>
            <div class="input-group">
                <label id="lbl-weight">Peso (kg):</label>
                <input type="number" id="weight" placeholder="Ex: 75">
            </div>
            <div class="input-group">
                <label id="lbl-height">Altura (m):</label>
                <input type="number" id="height" step="0.01" placeholder="Ex: 1.75">
            </div>
            <button onclick="calculateIMC()" class="btn-main" id="txt-btn-imc">Calcular IMC</button>
        </section>

        <section id="tool-bio" class="tool-section" style="display:none;">
            <h1 id="txt-title-bio">Idade Biológica</h1>
            <div class="input-group">
                <label id="lbl-habits">Você fuma ou é sedentário?</label>
                <select id="habit-score">
                    <option value="0">Não (Ativo/Saudável)</option>
                    <option value="5">Sim (Sedentário/Fumante)</option>
                </select>
            </div>
            <button onclick="calculateBio()" class="btn-main" id="txt-btn-bio">Analisar Bio</button>
        </section>

        <div id="result" class="result-container"></div>

        <div id="affiliate-area" class="affiliate-box" style="display: none;">
            <p id="aff-text"></p>
            <a id="aff-link" href="#" target="_blank"></a>
        </div>

        <div class="ad-placeholder">Publicidade</div>

        <footer>
            <a href="#" id="txt-privacy">Privacidade</a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
