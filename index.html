<section id="tool-cal" class="tool-section" style="display:none;">
    <h1 id="txt-title-cal">Gasto Calórico Diário</h1>
    <div class="input-group">
        <label id="lbl-gender">Gênero:</label>
        <select id="gender-cal">
            <option value="male">Masculino</option>
            <option value="female">Feminino</option>
        </select>
    </div>
    <div class="input-group">
        <label id="lbl-weight-cal">Peso (kg):</label>
        <input type="number" id="weight-cal" placeholder="Ex: 70">
    </div>
    <div class="input-group">
        <label id="lbl-height-cal">Altura (cm):</label>
        <input type="number" id="height-cal" placeholder="Ex: 175">
    </div>
    <div class="input-group">
        <label id="lbl-age-cal">Idade Cronológica:</label>
        <input type="number" id="age-cal" placeholder="Ex: 65">
    </div>
    <button onclick="calculateCal()" class="btn-main" id="btn-cal">Calcular</button>
</section>

<section id="tool-bio" class="tool-section" style="display:none;">
    <h1 id="txt-title-bio">Análise de Idade Biológica</h1>
    <div class="input-group">
        <label>Atividade Física:</label>
        <select id="bio-exercise">
            <option value="-3">Atleta / Diário</option>
            <option value="-1">Moderado (3x semana)</option>
            <option value="2">Leve (Caminhadas)</option>
            <option value="5">Sedentário total</option>
        </select>
    </div>
    <div class="input-group">
        <label>Alimentação:</label>
        <select id="bio-diet">
            <option value="-2">Orgânica / Equilibrada</option>
            <option value="0">Regular</option>
            <option value="4">Processados / Açúcar</option>
        </select>
    </div>
    <div class="input-group">
        <label>Fumo:</label>
        <select id="bio-smoke">
            <option value="0">Não fumante</option>
            <option value="8">Fumante ativo</option>
        </select>
    </div>
    <button onclick="calculateBio()" class="btn-main" id="btn-bio">Analisar Bio-Idade</button>
</section>
