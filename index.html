<h1>Calculadora de Idade</h1>

<input type="date" id="data">
<button onclick="calc()">Calcular</button>

<div id="res"></div>

</div>

<script>
function calc(){
let d=new Date(document.getElementById("data").value);
let h=new Date();

let idade=h.getFullYear()-d.getFullYear();
let m=h.getMonth()-d.getMonth();

if(m<0 || (m===0 && h.getDate()<d.getDate())) idade--;

document.getElementById("res").innerText="Você tem "+idade+" anos";
}
</script>
