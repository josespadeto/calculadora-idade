<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Idade Pro - Global</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="language-selector">
        <button onclick="setLanguage('pt')">PT</button>
        <button onclick="setLanguage('en')">EN</button>
        <button onclick="setLanguage('es')">ES</button>
    </div>

    <div class="container">
        <h1 id="txt-title">Calculadora de Idade</h1>
        
        <div class="input-group">
            <label for="birthdate" id="txt-label">Data de Nascimento:</label>
            <input type="date" id="birthdate">
        </div>

        <button onclick="calculateAge()" id="txt-btn">Calcular Idade</button>

        <div id="result" class="result-container">
            </div>

        <div id="affiliate-area" style="display: none; margin-top: 25px; padding: 15px; border-top: 1px solid #eee;">
            <p id="aff-text" style="font-size: 0.85rem; color: #666; margin-bottom: 8px;"></p>
            <a id="aff-link" href="#" target="_blank" style="color: #007bff; font-weight: bold; text-decoration: none; font-size: 0.95rem;"></a>
        </div>

        <div class="ad-box" style="margin-top: 30px; min-height: 90px; background: #fdfdfd; border: 1px dashed #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #bbb; text-transform: uppercase;">
            Publicidade
        </div>

        <footer style="margin-top: 25px;">
            <a href="#" id="txt-privacy" style="font-size: 0.75rem; color: #aaa; text-decoration: none;">Privacidade</a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
